services:
  ocean-api:
    container_name: ocean-api
    image: krre/ocean-api:1.0
    restart: always
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - RUST_LOG=info
    ports:
      - 127.0.0.1:4000:3000
    networks:
      - pg_network
    volumes:
      - ./config:/etc/ocean

networks:
  pg_network:
    external: true
    name: pg_network
