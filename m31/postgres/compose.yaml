services:
  postgres:
    container_name: postgres
    image: postgres:18.3
    restart: always
    environment:
      - POSTGRES_PASSWORD
      - OCEAN_PASSWORD
      - BLOG_PASSWORD
    ports:
      - ${PORT}:5432
    networks:
      - postgres
    volumes:
      - db:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d

networks:
  postgres:
    name: postgres

volumes:
  db:
